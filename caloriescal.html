<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calorie & Weight Avg Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .tab-active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .weight-btn-active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>

<body class="pb-32 pt-2">
    <!-- Top Navigation Tabs -->
    <nav
        class="max-w-md mx-auto px-4 flex justify-between items-center border-b border-slate-100 bg-white sticky top-0 z-[100] shadow-sm">
        <div class="flex gap-1">
            <button onclick="switchTab('today')" id="tab-today"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 tab-active transition-all">Today</button>
            <button onclick="switchTab('history')" id="tab-history"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Calendar</button>
            <button onclick="switchTab('trends')" id="tab-trends"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Trends</button>
            <button onclick="switchTab('settings')" id="tab-settings"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Settings</button>
        </div>
        <button onclick="initGAS()" class="text-slate-300 hover:text-green-500 transition"><i
                class="fas fa-sync-alt text-sm"></i></button>
    </nav>

    <!-- TODAY TAB -->
    <main id="content-today" class="max-w-md mx-auto p-4 space-y-6 relative z-10">
        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Calories Today
                    </h2>
                    <div class="flex items-baseline gap-2">
                        <span id="total-calories" class="text-5xl font-black italic">0</span>
                        <span class="text-slate-400 font-bold text-sm uppercase">kcal</span>
                    </div>
                </div>
                <div class="relative flex items-center justify-center">
                    <svg class="w-24 h-24">
                        <circle class="text-slate-800" stroke-width="8" stroke="currentColor" fill="transparent" r="42"
                            cx="48" cy="48" />
                        <circle id="progress-circle" class="text-orange-500 progress-ring__circle" stroke-width="8"
                            stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round"
                            stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" />
                    </svg>
                    <span id="percent-display" class="absolute text-xs font-bold">0%</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4 mt-6">
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Protein</span>
                    <div class="text-xs font-bold text-rose-400">
                        <span id="total-protein">0</span>/<span id="goal-protein-display">0</span><span
                            class="text-[9px] text-slate-500 ml-0.5">g</span>
                    </div>
                </div>
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Carbs</span>
                    <div class="text-xs font-bold text-blue-400">
                        <span id="total-carbs">0</span>/<span id="goal-carbs-display">0</span><span
                            class="text-[9px] text-slate-500 ml-0.5">g</span>
                    </div>
                </div>
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Fat</span>
                    <div class="text-xs font-bold text-amber-400">
                        <span id="total-fat">0</span>/<span id="goal-fat-display">0</span><span
                            class="text-[9px] text-slate-500 ml-0.5">g</span>
                    </div>
                </div>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-slate-800 rounded-2xl"><i class="fas fa-weight text-blue-400"></i></div>
                    <div>
                        <span class="text-[9px] text-slate-500 uppercase font-black block">Weight (Avg)</span>
                        <span id="current-weight-display" class="text-lg font-bold">--</span><span
                            class="text-[10px] text-slate-500 font-bold ml-1">kg</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <i id="icon-morning" class="fas fa-sun text-slate-100 text-xs"></i>
                    <i id="icon-evening" class="fas fa-moon text-slate-100 text-xs"></i>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-800 text-sm tracking-tight">บันทึกน้ำหนักวันนี้</h3>
                <div class="flex bg-slate-50 p-1.5 rounded-2xl w-32">
                    <button id="btn-morning" onclick="setWeightTime('morning')"
                        class="flex-1 py-2 text-[10px] font-bold rounded-lg transition-all weight-btn-active">เช้า</button>
                    <button id="btn-evening" onclick="setWeightTime('evening')"
                        class="flex-1 py-2 text-[10px] font-bold rounded-lg transition-all text-slate-400">เย็น</button>
                </div>
            </div>
            <div class="flex gap-4">
                <input type="number" id="daily-weight" placeholder="00.0" step="0.1"
                    class="flex-1 bg-slate-50 rounded-2xl px-6 py-4 text-xl font-bold text-slate-700 outline-none">
                <button onclick="saveWeight()"
                    class="bg-blue-500 text-white p-4 rounded-2xl shadow-lg hover:bg-blue-600 transition"><i
                        class="fas fa-check"></i></button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 text-sm tracking-tight mb-6">เพิ่มมื้ออาหาร</h3>
            <div class="space-y-4">
                <input type="text" id="food-name" placeholder="กินอะไรไปบ้าง?"
                    class="w-full pb-3 pt-1 bg-transparent border-b border-slate-100 focus:border-orange-400 outline-none transition text-sm">
                <div class="grid grid-cols-2 gap-6">
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">
                            Calories
                            <span id="calculated-hint"
                                class="text-[9px] text-orange-400 normal-case ml-1 font-medium hidden">(Calc: <span
                                    id="calc-val">0</span>)</span>
                        </label>
                        <input type="number" id="food-cal" placeholder="0"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Meal</label>
                        <select id="meal-type"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold appearance-none">
                            <option value="เช้า">เช้า</option>
                            <option value="กลางวัน">กลางวัน</option>
                            <option value="เย็น">เย็น</option>
                            <option value="ว่าง">ว่าง</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-6">
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-rose-500 font-bold uppercase block mb-1">Protein</label>
                        <input type="number" id="food-protein" oninput="updateCalculatedCalories()" placeholder="0"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-blue-500 font-bold uppercase block mb-1">Carbs</label>
                        <input type="number" id="food-carbs" oninput="updateCalculatedCalories()" placeholder="0"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-amber-500 font-bold uppercase block mb-1">Fat</label>
                        <input type="number" id="food-fat" oninput="updateCalculatedCalories()" placeholder="0"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                </div>
                <button onclick="addEntry()"
                    class="w-full bg-slate-800 text-white font-bold py-4 rounded-[1.5rem] shadow-xl hover:bg-orange-500 transition mt-2">บันทึกมื้อนี้</button>
            </div>
        </div>
        <div id="meal-sections-container" class="space-y-8 pt-4"></div>
    </main>

    <!-- CALENDAR TAB -->
    <main id="content-history" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="text-slate-400 p-2"><i
                        class="fas fa-chevron-left"></i></button>
                <h3 id="calendar-month-year" class="font-bold text-slate-800 text-sm uppercase tracking-widest">Month
                    Year</h3>
                <button onclick="changeMonth(1)" class="text-slate-400 p-2"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-2 mb-2 text-center text-[9px] font-black text-slate-300 uppercase">
                <div>S</div>
                <div>M</div>
                <div>T</div>
                <div>W</div>
                <div>T</div>
                <div>F</div>
                <div>S</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div id="history-detail" class="hidden bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 space-y-6">
            <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                <span id="selected-date-label"
                    class="text-xs font-bold text-slate-400 uppercase tracking-widest">Detail</span>
                <span id="selected-total-cal" class="text-sm font-black text-orange-500">0 kcal</span>
            </div>
            <div id="selected-nutrients" class="grid grid-cols-3 gap-2">
                <div class="bg-rose-50 p-2 rounded-xl text-center">
                    <span class="text-[8px] font-black text-rose-400 uppercase block">P</span>
                    <span id="selected-p" class="text-xs font-bold text-slate-700">0</span><span
                        class="text-[8px] text-slate-400 ml-0.5">g</span>
                </div>
                <div class="bg-blue-50 p-2 rounded-xl text-center">
                    <span class="text-[8px] font-black text-blue-400 uppercase block">C</span>
                    <span id="selected-c" class="text-xs font-bold text-slate-700">0</span><span
                        class="text-[8px] text-slate-400 ml-0.5">g</span>
                </div>
                <div class="bg-amber-50 p-2 rounded-xl text-center">
                    <span class="text-[8px] font-black text-amber-400 uppercase block">F</span>
                    <span id="selected-f" class="text-xs font-bold text-slate-700">0</span><span
                        class="text-[8px] text-slate-400 ml-0.5">g</span>
                </div>
            </div>
            <div id="selected-day-entries" class="space-y-2"></div>
        </div>
    </main>

    <!-- TRENDS TAB -->
    <main id="content-trends" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 text-sm uppercase mb-6">Weight Trends</h3>
            <div class="h-64"><canvas id="weightChart"></canvas></div>
            <div class="flex gap-4 mt-4">
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl text-center">
                    <span class="text-[9px] text-slate-400 uppercase font-black block">Max</span>
                    <span id="stat-max-w" class="text-sm font-bold text-slate-700">--</span>
                </div>
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl text-center">
                    <span class="text-[9px] text-slate-400 uppercase font-black block">Min</span>
                    <span id="stat-min-w" class="text-sm font-bold text-slate-700">--</span>
                </div>
            </div>
        </div>
    </main>

    <!-- SETTINGS TAB -->
    <main id="content-settings" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-rose-50/50 p-4 rounded-2xl border border-rose-100">
                    <label class="text-[10px] text-rose-400 font-black uppercase mb-1 block">Energy Goal</label>
                    <input type="number" id="set-goal" onchange="updateGoal()"
                        class="bg-transparent text-xl font-black text-slate-800 outline-none w-full">
                </div>
                <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                    <label class="text-[10px] text-indigo-400 font-black uppercase mb-1 block">Protein Goal</label>
                    <input type="number" id="set-goal-protein" onchange="updateGoal()"
                        class="bg-transparent text-xl font-black text-slate-800 outline-none w-full">
                </div>
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <label class="text-[10px] text-blue-400 font-black uppercase mb-1 block">Carbs Goal</label>
                    <input type="number" id="set-goal-carbs" onchange="updateGoal()"
                        class="bg-transparent text-xl font-black text-slate-800 outline-none w-full">
                </div>
                <div class="bg-amber-50/50 p-4 rounded-2xl border border-amber-100">
                    <label class="text-[10px] text-amber-400 font-black uppercase mb-1 block">Fat Goal</label>
                    <input type="number" id="set-goal-fat" onchange="updateGoal()"
                        class="bg-transparent text-xl font-black text-slate-800 outline-none w-full">
                </div>
            </div>
            <button onclick="resetData()"
                class="w-full py-4 text-xs font-bold text-rose-500 bg-rose-50 rounded-2xl">ล้างข้อมูลทั้งหมด</button>
        </div>
    </main>

    <!-- Loader Overlay -->
    <div id="sync-loader"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[9999] flex flex-col items-center justify-center transition-all opacity-0 pointer-events-none">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl flex flex-col items-center gap-4 scale-90 transition-all"
            id="sync-loader-card">
            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="sync-text" class="text-slate-800 font-bold text-sm">กำลังเชื่อมต่อ...</p>
            <button onclick="hideSyncLoader()" class="text-[10px] text-slate-400 uppercase font-black">Skip
                Sync</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza3Y1Xzql7VImSvY-_4HXpMoWWTb680tm5Lm-hxqPVy7fir4yDrTLHK1fcjcum_iAWOA/exec";

        // 1. Global State
        let entries = [];
        let weightData = {};
        let goals = { energy: 2000, protein: 100 };
        let currentWeightTime = 'morning';
        let calendarDate = new Date();
        let weightChart = null;
        let isSyncing = false;

        // 2. Communication (CD4 style)
        function fetchDataJSONP(action) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(data);
                };
                script.onerror = () => {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Network error'));
                };
                script.src = `${SCRIPT_URL}?action=${action}&callback=${callbackName}&t=${Date.now()}`;
                document.head.appendChild(script);
            });
        }

        async function syncToSheet() {
            if (isSyncing || SCRIPT_URL.includes("YOUR_SCRIPT_URL")) return;
            isSyncing = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'sync', payload: { entries, weightData, goals } })
                });
            } catch (err) { console.error(err); }
            finally { isSyncing = false; }
        }

        async function initGAS() {
            showSyncLoader("กำลังดึงข้อมูล Cloud...");
            try {
                const data = await fetchDataJSONP('read');
                if (data) {
                    entries = data.entries || [];
                    weightData = data.weightData || {};
                    goals = data.goals || { energy: 2000, protein: 100 };

                    // Normalize weight keys
                    const norm = {};
                    Object.keys(weightData).forEach(k => {
                        const d = new Date(k);
                        const clean = isNaN(d.getTime()) ? k : d.toLocaleDateString('en-CA');
                        norm[clean] = weightData[k];
                    });
                    weightData = norm;

                    document.getElementById('set-goal').value = goals.energy;
                    document.getElementById('set-goal-protein').value = goals.protein;
                    render();
                }
            } catch (e) {
                console.error(e);
                entries = JSON.parse(localStorage.getItem('gas_entries_v3') || '[]');
                weightData = JSON.parse(localStorage.getItem('gas_weight_data') || '{}');
                goals = JSON.parse(localStorage.getItem('gas_goals') || '{"energy":2000,"protein":100}');
                render();
            } finally { hideSyncLoader(); }
        }

        // 3. UI Helpers
        function showSyncLoader(text) {
            const loader = document.getElementById('sync-loader');
            document.getElementById('sync-text').innerText = text;
            loader.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('sync-loader-card').classList.add('scale-100');
        }
        function hideSyncLoader() {
            document.getElementById('sync-loader').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('sync-loader-card').classList.remove('scale-100');
        }
        function showMessage(t, type = "success") {
            const m = document.createElement('div');
            m.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full text-white text-[10px] font-bold z-[200] ${type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`;
            m.innerText = t;
            document.body.appendChild(m);
            setTimeout(() => { if (m.parentNode) m.parentNode.removeChild(m); }, 2000);
        }
        function switchTab(tab) {
            ['today', 'history', 'trends', 'settings'].forEach(t => {
                document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`tab-${t}`).classList.toggle('tab-active', t === tab);
            });
            if (tab === 'history') renderCalendar();
            if (tab === 'trends') renderWeightChart();
        }

        // 4. Logic
        function setWeightTime(time) {
            currentWeightTime = time;
            document.getElementById('btn-morning').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'morning' ? 'weight-btn-active' : 'text-slate-400'}`;
            document.getElementById('btn-evening').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'evening' ? 'weight-btn-active' : 'text-slate-400'}`;
            const today = new Date().toLocaleDateString('en-CA');
            document.getElementById('daily-weight').value = (weightData[today] && weightData[today][time]) ? weightData[today][time] : "";
        }

        function saveWeight() {
            const val = parseFloat(document.getElementById('daily-weight').value);
            if (isNaN(val)) return;
            const today = new Date().toLocaleDateString('en-CA');
            if (!weightData[today]) weightData[today] = {};
            weightData[today][currentWeightTime] = val;
            localStorage.setItem('gas_weight_data', JSON.stringify(weightData));
            render();
            syncToSheet();
            showMessage("บันทึกน้ำหนักแล้ว");
        }

        function getDailyAvg(dateStr) {
            const d = weightData[dateStr];
            if (!d) return null;
            const v = [];
            if (d.morning) v.push(d.morning);
            if (d.evening) v.push(d.evening);
            return v.length ? v.reduce((a, b) => a + b) / v.length : null;
        }

        function addEntry() {
            const name = document.getElementById('food-name').value;
            const cal = parseInt(document.getElementById('food-cal').value);
            if (!name || isNaN(cal)) return showMessage("กรุณากรอกข้อมูล", "error");

            entries.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('en-CA'),
                meal: document.getElementById('meal-type').value,
                name, calories: cal,
                protein: parseFloat(document.getElementById('food-protein').value) || 0,
                carbs: parseFloat(document.getElementById('food-carbs').value) || 0,
                fat: parseFloat(document.getElementById('food-fat').value) || 0
            });
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            ["food-name", "food-cal", "food-protein", "food-carbs", "food-fat"].forEach(id => document.getElementById(id).value = "");
            document.getElementById('calculated-hint').classList.add('hidden');
            render(); syncToSheet(); showMessage("บันทึกอาหารแล้ว");
        }

        function updateCalculatedCalories() {
            const p = parseFloat(document.getElementById('food-protein').value) || 0;
            const c = parseFloat(document.getElementById('food-carbs').value) || 0;
            const f = parseFloat(document.getElementById('food-fat').value) || 0;
            const calc = (p * 4) + (c * 4) + (f * 9);

            const hint = document.getElementById('calculated-hint');
            const display = document.getElementById('calc-val');

            if (calc > 0) {
                hint.classList.remove('hidden');
                display.innerText = Math.round(calc);
            } else {
                hint.classList.add('hidden');
            }
        }

        function removeEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            render(); syncToSheet();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const first = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1).getDay();
            const days = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();
            document.getElementById('calendar-month-year').innerText = calendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';

            const calMap = entries.reduce((a, c) => { a[c.date] = (a[c.date] || 0) + c.calories; return a; }, {});
            const todayStr = new Date().toLocaleDateString('en-CA');

            for (let day = 1; day <= days; day++) {
                const dateStr = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day).toLocaleDateString('en-CA');
                const hasData = calMap[dateStr] > 0;
                const div = document.createElement('div');
                div.className = `h-10 flex flex-col items-center justify-center rounded-xl text-[10px] font-bold cursor-pointer ${todayStr === dateStr ? 'bg-orange-500 text-white' : 'text-slate-600'}`;
                div.innerHTML = `<span>${day}</span>${hasData ? '<div class="w-1 h-1 rounded-full bg-current mt-0.5 opacity-50"></div>' : ''}`;
                div.onclick = () => showDayDetail(dateStr);
                grid.appendChild(div);
            }
        }

        function showDayDetail(dateStr) {
            const dayEntries = entries.filter(e => e.date === dateStr);
            const detail = document.getElementById('history-detail');
            if (!dayEntries.length) return detail.classList.add('hidden');

            detail.classList.remove('hidden');
            document.getElementById('selected-date-label').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

            const totals = dayEntries.reduce((s, e) => ({
                cal: s.cal + e.calories,
                p: s.p + (e.protein || 0),
                c: s.c + (e.carbs || 0),
                f: s.f + (e.fat || 0)
            }), { cal: 0, p: 0, c: 0, f: 0 });

            document.getElementById('selected-total-cal').innerText = `${totals.cal} kcal`;
            document.getElementById('selected-p').innerText = Math.round(totals.p);
            document.getElementById('selected-c').innerText = Math.round(totals.c);
            document.getElementById('selected-f').innerText = Math.round(totals.f);

            document.getElementById('selected-day-entries').innerHTML = dayEntries.map(e => `
                <div class="flex justify-between items-center py-2 border-b border-slate-50 text-xs">
                    <div><div class="font-bold text-slate-700">${e.name}</div><div class="text-[8px] text-slate-400">P:${e.protein} C:${e.carbs} F:${e.fat}</div></div>
                    <span class="font-bold text-orange-400">${e.calories} kcal</span>
                </div>
            `).join('');
            detail.scrollIntoView({ behavior: 'smooth' });
        }

        function renderWeightChart() {
            const canvas = document.getElementById('weightChart');
            const dates = Object.keys(weightData).sort();
            const avgs = dates.map(d => getDailyAvg(d)).filter(v => v !== null);
            const labels = dates.filter(d => getDailyAvg(d) !== null).map(d => new Date(d).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }));

            if (weightChart) weightChart.destroy();
            if (avgs.length) {
                document.getElementById('stat-max-w').innerText = Math.max(...avgs).toFixed(1);
                document.getElementById('stat-min-w').innerText = Math.min(...avgs).toFixed(1);
            }
            weightChart = new Chart(canvas, {
                type: 'line',
                data: { labels, datasets: [{ data: avgs, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function render() {
            const today = new Date().toLocaleDateString('en-CA');
            const todayEntries = entries.filter(e => e.date === today);
            const total = todayEntries.reduce((s, e) => ({
                cal: s.cal + e.calories, p: s.p + e.protein, c: s.c + e.carbs, f: s.f + e.fat
            }), { cal: 0, p: 0, c: 0, f: 0 });

            document.getElementById('total-calories').innerText = total.cal.toLocaleString();
            document.getElementById('total-protein').innerText = Math.round(total.p);
            document.getElementById('total-carbs').innerText = Math.round(total.c);
            document.getElementById('total-fat').innerText = Math.round(total.f);

            document.getElementById('goal-protein-display').innerText = goals.protein || 0;
            document.getElementById('goal-carbs-display').innerText = goals.carbs || 0;
            document.getElementById('goal-fat-display').innerText = goals.fat || 0;

            const pct = Math.min((total.cal / goals.energy) * 100, 100);
            document.getElementById('progress-circle').style.strokeDashoffset = 263.89 - (pct / 100 * 263.89);
            document.getElementById('percent-display').innerText = Math.round(pct) + '%';

            const avg = getDailyAvg(today);
            document.getElementById('current-weight-display').innerText = avg ? avg.toFixed(1) : "--";
            document.getElementById('icon-morning').className = `fas fa-sun ${weightData[today]?.morning ? 'text-orange-400' : 'text-slate-100'}`;
            document.getElementById('icon-evening').className = `fas fa-moon ${weightData[today]?.evening ? 'text-blue-400' : 'text-slate-100'}`;

            const container = document.getElementById('meal-sections-container');
            container.innerHTML = '';
            ["เช้า", "กลางวัน", "เย็น", "ว่าง"].forEach(meal => {
                const mEntries = todayEntries.filter(e => e.meal === meal);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between px-2 mb-2 text-[9px] font-black text-slate-300 uppercase"><span>${meal}</span><span>${mEntries.reduce((s, e) => s + e.calories, 0)} kcal</span></div>
                    <div class="space-y-2">${mEntries.map(e => `
                        <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50 flex justify-between items-center">
                            <div><div class="text-xs font-bold text-slate-700">${e.name}</div><div class="text-[9px] text-slate-400">P:${e.protein} C:${e.carbs} F:${e.fat}</div></div>
                            <div class="flex items-center gap-3"><span class="text-xs font-bold text-slate-400">${e.calories} kcal</span><button onclick="removeEntry(${e.id})" class="text-slate-200"><i class="fas fa-times-circle"></i></button></div>
                        </div>
                    `).join('')}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateGoal() {
            goals.energy = parseInt(document.getElementById('set-goal').value) || 2000;
            goals.protein = parseInt(document.getElementById('set-goal-protein').value) || 100;
            goals.carbs = parseInt(document.getElementById('set-goal-carbs').value) || 250;
            goals.fat = parseInt(document.getElementById('set-goal-fat').value) || 65;
            localStorage.setItem('gas_goals', JSON.stringify(goals)); render(); syncToSheet();
        }
        function changeMonth(o) { calendarDate.setMonth(calendarDate.getMonth() + o); renderCalendar(); }
        function resetData() { if (confirm("ล้างข้อมูล?")) { localStorage.clear(); location.reload(); } }
        function handleImageScan(i) { showMessage("Coming Soon!"); }

        window.onload = () => initGAS();
    </script>
</body>

</html>
