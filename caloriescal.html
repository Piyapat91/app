<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calorie & Weight Avg Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .tab-active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            padding-top: 4px;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-cell:hover {
            background-color: #f1f5f9;
        }

        .day-cell.today {
            border: 1px solid #f97316;
            font-weight: bold;
        }

        .weight-btn-active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>

<body class="pb-32 pt-2">
    <!-- Top Navigation Tabs -->
    <nav
        class="max-w-md mx-auto px-4 flex justify-between items-center border-b border-slate-100 bg-white sticky top-0 z-[100] shadow-sm">
        <div class="flex gap-1">
            <button onclick="switchTab('today')" id="tab-today"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 tab-active transition-all">Today</button>
            <button onclick="switchTab('history')" id="tab-history"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Calendar</button>
            <button onclick="switchTab('trends')" id="tab-trends"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Trends</button>
            <button onclick="switchTab('settings')" id="tab-settings"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Settings</button>
        </div>
        <button onclick="initGAS()" class="text-slate-300 hover:text-green-500 transition"><i
                class="fas fa-sync-alt text-sm"></i></button>
    </nav>

    <!-- TODAY TAB -->
    <main id="content-today" class="max-w-md mx-auto p-4 space-y-6 relative z-10">
        <!-- Dashboard Card -->
        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Calories Today</h2>
                    <div class="flex items-baseline gap-2">
                        <span id="total-calories" class="text-5xl font-black italic">0</span>
                        <span class="text-slate-400 font-bold text-sm uppercase">kcal</span>
                    </div>
                </div>
                <div class="relative flex items-center justify-center">
                    <svg class="w-24 h-24">
                        <circle class="text-slate-800" stroke-width="8" stroke="currentColor" fill="transparent"
                            r="42" cx="48" cy="48" />
                        <circle id="progress-circle" class="text-orange-500 progress-ring__circle" stroke-width="8"
                            stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round"
                            stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" />
                    </svg>
                    <span id="percent-display" class="absolute text-xs font-bold">0%</span>
                </div>
            </div>

            <!-- Nutrient Summary -->
            <div class="grid grid-cols-3 gap-4 mt-6">
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Protein</span>
                    <div class="text-sm font-bold text-rose-400">
                        <span id="total-protein">0</span>/<span id="goal-protein-display">0</span><span class="text-[9px] text-slate-500 ml-0.5">g</span>
                    </div>
                </div>
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Carbs</span>
                    <div class="text-sm font-bold text-blue-400"><span id="total-carbs">0</span><span class="text-[9px] text-slate-500 ml-0.5">g</span></div>
                </div>
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Fat</span>
                    <div class="text-sm font-bold text-amber-400"><span id="total-fat">0</span><span class="text-[9px] text-slate-500 ml-0.5">g</span></div>
                </div>
            </div>

            <!-- Weight Display in Card -->
            <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-slate-800 rounded-2xl">
                        <i class="fas fa-weight text-blue-400"></i>
                    </div>
                    <div>
                        <span class="text-[9px] text-slate-500 uppercase font-black block">Weight (Avg)</span>
                        <span id="current-weight-display" class="text-lg font-bold">--</span>
                        <span class="text-[10px] text-slate-500 font-bold">kg</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <i id="icon-morning" class="fas fa-sun text-slate-100 text-xs"></i>
                    <i id="icon-evening" class="fas fa-moon text-slate-100 text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Weight Entry Form -->
        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-800 text-sm tracking-tight">บันทึกน้ำหนักวันนี้</h3>
                <div class="flex bg-slate-50 p-1.5 rounded-2xl w-32">
                    <button id="btn-morning" onclick="setWeightTime('morning')"
                        class="flex-1 py-3 text-xs font-bold rounded-xl transition-all weight-btn-active">เช้า</button>
                    <button id="btn-evening" onclick="setWeightTime('evening')"
                        class="flex-1 py-3 text-xs font-bold rounded-xl transition-all text-slate-400">เย็น</button>
                </div>
            </div>
            <div class="flex gap-4">
                <input type="number" id="daily-weight" placeholder="00.0" step="0.1"
                    class="flex-1 bg-slate-50 rounded-2xl px-6 py-4 text-xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-400/20">
                <button onclick="saveWeight()"
                    class="bg-blue-500 text-white p-4 rounded-2xl shadow-lg shadow-blue-500/20 hover:bg-blue-600 transition">
                    <i class="fas fa-check"></i>
                </button>
            </div>
        </div>

        <!-- Add Food Form -->
        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-800 text-sm tracking-tight">เพิ่มมื้ออาหาร</h3>
                <label class="cursor-pointer text-orange-500 text-xs font-bold flex items-center gap-1">
                    <i class="fas fa-camera-retro text-lg"></i>
                    <input type="file" accept="image/*" class="hidden" onchange="handleImageScan(this)">
                </label>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="food-name" placeholder="กินอะไรไปบ้าง?"
                        class="w-full pb-3 pt-1 bg-transparent border-b border-slate-100 focus:border-orange-400 outline-none transition text-sm">
                    <button onclick="analyzeFood()"
                        class="absolute right-0 top-0 text-[10px] font-bold text-orange-400">AI ช่วยนึก</button>
                </div>
                <div id="ai-loading" class="hidden py-2 text-center">
                    <div class="loading-spinner mx-auto mb-1"></div>
                    <span id="loader-text"
                        class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Analysing...</span>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="border-b border-slate-100">
                        <label
                            class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter block mb-1">
                            Calories 
                            <span id="calculated-hint" class="text-[9px] text-orange-400 normal-case ml-1 font-medium hidden">(Calc: <span id="calc-val">0</span>)</span>
                        </label>
                        <input type="number" id="food-cal" placeholder="0"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label
                            class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter block mb-1">Meal</label>
                        <select id="meal-type"
                            class="w-full pb-2 bg-transparent outline-none text-sm font-bold appearance-none">
                            <option value="เช้า">เช้า</option>
                            <option value="กลางวัน">กลางวัน</option>
                            <option value="เย็น">เย็น</option>
                            <option value="ว่าง">ว่าง</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-6">
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-rose-500 font-bold uppercase block mb-1">Protein</label>
                        <input type="number" id="food-protein" oninput="updateCalculatedCalories()" placeholder="0" class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-blue-500 font-bold uppercase block mb-1">Carbs</label>
                        <input type="number" id="food-carbs" oninput="updateCalculatedCalories()" placeholder="0" class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                    <div class="border-b border-slate-100">
                        <label class="text-[10px] text-amber-500 font-bold uppercase block mb-1">Fat</label>
                        <input type="number" id="food-fat" oninput="updateCalculatedCalories()" placeholder="0" class="w-full pb-2 bg-transparent outline-none text-sm font-bold">
                    </div>
                </div>
                <button onclick="addEntry()"
                    class="w-full bg-slate-800 text-white font-bold py-4 rounded-[1.5rem] shadow-xl hover:bg-orange-500 transition mt-2">บันทึกมื้อนี้</button>
            </div>
        </div>
        <div id="meal-sections-container" class="space-y-8 pt-4"></div>
    </main>

    <!-- CALENDAR TAB -->
    <main id="content-history" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="text-slate-400 p-2"><i
                        class="fas fa-chevron-left"></i></button>
                <h3 id="calendar-month-year" class="font-bold text-slate-800 text-sm uppercase tracking-widest">May 2024
                </h3>
                <button onclick="changeMonth(1)" class="text-slate-400 p-2"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-2 mb-2">
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">S</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">M</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">T</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">W</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">T</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">F</div>
                <div class="text-center text-[9px] font-black text-slate-300 uppercase">S</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div id="history-detail" class="hidden bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-50 pb-4">
                <span id="selected-date-label" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Date Detail</span>
                <span id="selected-total-cal" class="text-sm font-black text-orange-500">0 kcal</span>
            </div>
            <div id="selected-day-entries" class="space-y-2"></div>
        </div>
    </main>

    <!-- TRENDS TAB -->
    <main id="content-trends" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-800 text-sm tracking-tight uppercase">Weight Trends (Avg)</h3>
                <div class="flex gap-4">
                    <div class="text-right">
                        <span class="text-[8px] text-slate-400 uppercase font-black block">Max</span>
                        <span id="stat-max-w" class="text-xs font-bold text-slate-700">--</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[8px] text-slate-400 uppercase font-black block">Min</span>
                        <span id="stat-min-w" class="text-xs font-bold text-slate-700">--</span>
                    </div>
                </div>
            </div>
            <div class="h-64">
                <canvas id="weightChart"></canvas>
            </div>
        </div>
    </main>

    <!-- SETTINGS TAB -->
    <main id="content-settings" class="max-w-md mx-auto p-4 space-y-6 hidden relative z-10">
        <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100 space-y-8">
            <div>
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-widest mb-6">User Goals</h3>
                <div class="space-y-4">
                    <div class="bg-slate-50 p-6 rounded-[1.5rem]">
                        <label class="text-[10px] text-slate-400 font-bold uppercase block mb-2">Daily Calorie Goal</label>
                        <div class="flex items-center gap-4">
                            <input type="number" id="set-goal" onchange="updateGoal()"
                                class="bg-transparent text-3xl font-black text-slate-800 outline-none w-full" placeholder="1800">
                            <span class="text-xs font-bold text-slate-400">kcal</span>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[1.5rem]">
                        <label class="text-[10px] text-slate-400 font-bold uppercase block mb-2">Daily Protein Goal</label>
                        <div class="flex items-center gap-4">
                            <input type="number" id="set-goal-protein" onchange="updateGoal()"
                                class="bg-transparent text-3xl font-black text-slate-800 outline-none w-full" placeholder="100">
                            <span class="text-xs font-bold text-slate-400">g</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-8 border-t border-slate-50">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-widest mb-6">Data Management</h3>
                <button onclick="resetData()" 
                    class="w-full py-4 px-6 bg-rose-50 text-rose-500 font-bold rounded-2xl hover:bg-rose-100 transition flex items-center justify-center gap-3">
                    <i class="fas fa-trash-alt"></i>
                    <span>Reset All Data</span>
                </button>
            </div>
            
            <div class="text-center">
                <p class="text-[10px] text-slate-300 font-medium">Cloud Sync is active via Google Sheets</p>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBhA0RS8bUoDVDuGQj7lP266gmWCa0m8SQ"; 
        
        /**
         * Paste your Google Apps Script Web App URL here
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza3Y1Xzql7VImSvY-_4HXpMoWWTb680tm5Lm-hxqPVy7fir4yDrTLHK1fcjcum_iAWOA/exec"; 

        let entries = JSON.parse(localStorage.getItem('gas_entries_v3')) || [];
        let weightData = JSON.parse(localStorage.getItem('gas_weight_data')) || {};
        let goals = JSON.parse(localStorage.getItem('gas_goals')) || { energy: 1800, protein: 100 };
        let currentWeightTime = 'morning';
        let calendarDate = new Date();
        let weightChart = null;

        /**
         * Helper for Cross-Origin Data Reading (JSONP)
         */
        function fetchDataJSONP(action) {
            return new Promise((resolve, reject) => {
                if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) {
                    resolve(null);
                    return;
                }
                const callbackName = 'cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                script.onerror = () => reject(new Error('Network connectivity issue'));
                script.src = `${SCRIPT_URL}?action=${action}&callback=${callbackName}`;
                document.body.appendChild(script);
                setTimeout(() => { if (window[callbackName]) reject(new Error('Timeout')); }, 10000);
            });
        }

        /**
         * Initialize data from Google Sheets via JSONP
         */
        async function initGAS() {
            if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) return;
            try {
                const data = await fetchDataJSONP('read');
                // Check if cloud actually has data
                const hasCloudData = data && (
                    (data.entries && data.entries.length > 0) || 
                    (data.weightData && Object.keys(data.weightData).length > 0)
                );
                
                if (hasCloudData) {
                    if (data.entries) entries = data.entries;
                    if (data.weightData) weightData = data.weightData;
                    if (data.goals) goals = data.goals;
                    
                    localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
                    localStorage.setItem('gas_weight_data', JSON.stringify(weightData));
                    localStorage.setItem('gas_goals', JSON.stringify(goals));
                    
                    const goalInput = document.getElementById('set-goal');
                    const proteinGoalInput = document.getElementById('set-goal-protein');
                    if (goalInput) goalInput.value = goals.energy;
                    if (proteinGoalInput) proteinGoalInput.value = goals.protein || 100;
                    render();
                    showMessage("Cloud Synced", "success");
                }
            } catch (e) {
                console.error("Cloud Sync Failed:", e);
                // Local data is already rendered by window.onload
            }
        }

        /**
         * Sync all data to Google Sheets via POST
         */
        async function syncToSheet() {
            if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) return;

            const payload = {
                action: 'sync',
                payload: {
                    entries: entries,
                    weightData: weightData,
                    goals: goals
                }
            };

            showMessage("กำลังซิงค์...", "success");
            try {
                // Using no-cors mode for GAS POST
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                setTimeout(() => {
                    showMessage("ซิงค์สำเร็จ!", "success");
                }, 1000);
            } catch (err) {
                showMessage("Sync Error: " + err.message);
            }
        }

        // Weight Logic
        function setWeightTime(time) {
            currentWeightTime = time;
            document.getElementById('btn-morning').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'morning' ? 'weight-btn-active' : 'text-slate-400'}`;
            document.getElementById('btn-evening').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'evening' ? 'weight-btn-active' : 'text-slate-400'}`;

            const today = new Date().toISOString().split('T')[0];
            const currentVal = (weightData[today] && weightData[today][time]) ? weightData[today][time] : "";
            const weightInput = document.getElementById('daily-weight');
            if (weightInput) weightInput.value = currentVal;
        }

        function saveWeight() {
            const val = parseFloat(document.getElementById('daily-weight').value);
            if (!val) return;
            const today = new Date().toISOString().split('T')[0];
            if (!weightData[today]) weightData[today] = {};
            weightData[today][currentWeightTime] = val;
            localStorage.setItem('gas_weight_data', JSON.stringify(weightData));
            render();
            showMessage(`บันทึกน้ำหนัก${currentWeightTime === 'morning' ? 'เช้า' : 'เย็น'}แล้ว`, "success");
            syncToSheet(); 
        }

        function getDailyAvg(dateStr) {
            const data = weightData[dateStr];
            if (!data) return null;
            const vals = [];
            if (data.morning) vals.push(data.morning);
            if (data.evening) vals.push(data.evening);
            if (vals.length === 0) return null;
            return vals.reduce((a, b) => a + b, 0) / vals.length;
        }

        // Navigation
        function switchTab(tab) {
            console.log("Switching to tab: " + tab);
            ['today', 'history', 'trends', 'settings'].forEach(t => {
                const content = document.getElementById(`content-${t}`);
                const tabBtn = document.getElementById(`tab-${t}`);
                if (content) content.classList.toggle('hidden', t !== tab);
                if (tabBtn) tabBtn.classList.toggle('tab-active', t === tab);
            });
            if (tab === 'history') renderCalendar();
            if (tab === 'trends') renderWeightChart();
        }

        // Trends View
        function renderWeightChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            const dates = Object.keys(weightData).sort();
            const avgWeights = dates.map(d => getDailyAvg(d)).filter(v => v !== null);
            const validDates = dates.filter(d => getDailyAvg(d) !== null);

            if (weightChart) weightChart.destroy();
            if (avgWeights.length > 0) {
                document.getElementById('stat-max-w').innerText = Math.max(...avgWeights).toFixed(1);
                document.getElementById('stat-min-w').innerText = Math.min(...avgWeights).toFixed(1);
            }

            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: validDates.map(d => new Date(d).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })),
                    datasets: [{
                        data: avgWeights,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#f8fafc' } }, x: { grid: { display: false } } }
                }
            });
        }

        // AI & Food Logic
        async function analyzeFood() {
            const foodName = document.getElementById('food-name').value;
            if (!foodName) return;
            const loader = document.getElementById('ai-loading');
            loader.classList.remove('hidden');
            try {
                if (!apiKey) {
                    showMessage("กรุณาใส่ Gemini API Key ในโค้ด");
                    loader.classList.add('hidden');
                    return;
                }
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Estimate calories for ${foodName}. Return ONLY a raw JSON object (no markdown, no backticks): {"calories":number, "foodNameThai":"string", "protein":number, "carbs":number, "fat":number}` }] }]
                    })
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error.message);
                let text = result.candidates[0].content.parts[0].text;
                // Remove potential markdown code blocks
                text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                const data = JSON.parse(text);
                document.getElementById('food-name').value = data.foodNameThai || foodName;
                document.getElementById('food-cal').value = data.calories || 0;
                document.getElementById('food-protein').value = data.protein || 0;
                document.getElementById('food-carbs').value = data.carbs || 0;
                document.getElementById('food-fat').value = data.fat || 0;
                updateCalculatedCalories();
                showMessage("AI คำนวณให้แล้ว", "success");
            } catch (e) { showMessage("AI Error: " + e.message); }
            finally { loader.classList.add('hidden'); }
        }

        function addEntry() {
            const name = document.getElementById('food-name').value;
            const cal = parseInt(document.getElementById('food-cal').value);
            if (!name || isNaN(cal)) {
                showMessage("กรุณากรอกชื่ออาหารและแคลอรี่", "error");
                return;
            }

            const newEntry = {
                id: Date.now(),
                // Use en-CA for reliable YYYY-MM-DD (e.g. 2026-05-03)
                date: new Date().toLocaleDateString('en-CA'), 
                meal: document.getElementById('meal-type').value,
                name: name,
                calories: cal,
                protein: parseFloat(document.getElementById('food-protein').value) || 0,
                carbs: parseFloat(document.getElementById('food-carbs').value) || 0,
                fat: parseFloat(document.getElementById('food-fat').value) || 0
            };

            entries.unshift(newEntry);
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            
            // Reset UI inputs
            document.getElementById('food-name').value = '';
            document.getElementById('food-cal').value = '';
            document.getElementById('food-protein').value = '';
            document.getElementById('food-carbs').value = '';
            document.getElementById('food-fat').value = '';
            document.getElementById('calculated-hint').classList.add('hidden');

            render();
            syncToSheet();
            showMessage("บันทึกอาหารแล้ว", "success");
        }

        function updateCalculatedCalories() {
            const p = parseFloat(document.getElementById('food-protein').value) || 0;
            const c = parseFloat(document.getElementById('food-carbs').value) || 0;
            const f = parseFloat(document.getElementById('food-fat').value) || 0;
            const calc = (p * 4) + (c * 4) + (f * 9);
            
            const hint = document.getElementById('calculated-hint');
            const display = document.getElementById('calc-val');
            
            if (calc > 0) {
                hint.classList.remove('hidden');
                display.innerText = Math.round(calc);
            } else {
                hint.classList.add('hidden');
            }
        }

        function removeEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            render();
            syncToSheet(); 
        }

        // Calendar Helper
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const firstDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();
            document.getElementById('calendar-month-year').innerText = calendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

            const grouped = entries.reduce((acc, curr) => {
                acc[curr.date] = (acc[curr.date] || 0) + curr.calories;
                return acc;
            }, {});

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${calendarDate.getFullYear()}-${String(calendarDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cal = grouped[dateStr] || 0;
                const div = document.createElement('div');
                div.className = `day-cell ${new Date().toISOString().split('T')[0] === dateStr ? 'today' : ''}`;
                div.innerHTML = `<span>${day}</span>${cal > 0 ? `<div class="h-1 w-full mt-1 ${cal > goals.energy ? 'bg-red-400' : 'bg-green-400'} rounded-full"></div>` : ''}`;
                div.onclick = () => showDayDetail(dateStr);
                grid.appendChild(div);
            }
        }

        function showDayDetail(dateStr) {
            const dayEntries = entries.filter(e => e.date === dateStr);
            const detail = document.getElementById('history-detail');
            if (dayEntries.length === 0) { detail.classList.add('hidden'); return; }
            detail.classList.remove('hidden');
            document.getElementById('selected-date-label').innerText = dateStr;
            const total = dayEntries.reduce((s, e) => s + e.calories, 0);
            document.getElementById('selected-total-cal').innerText = `${total} kcal`;
            document.getElementById('selected-day-entries').innerHTML = dayEntries.map(e => `
                <div class="flex justify-between py-2 border-b border-slate-50">
                    <span class="text-xs font-bold">${e.name}</span>
                    <span class="text-xs text-slate-500">${e.calories} kcal</span>
                </div>
            `).join('');
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            
            // Robust date filtering: handles both ISO and long date strings from GAS
            const todayEntries = entries.filter(e => {
                if (!e.date) return false;
                try {
                    const d = new Date(e.date);
                    if (isNaN(d.getTime())) return String(e.date).includes(today);
                    return d.toISOString().split('T')[0] === today;
                } catch (err) {
                    return String(e.date).includes(today);
                }
            });
            
            const totalCal = todayEntries.reduce((s, e) => s + (e.calories || 0), 0);
            const totalProtein = todayEntries.reduce((s, e) => s + (e.protein || 0), 0);
            const totalCarbs = todayEntries.reduce((s, e) => s + (e.carbs || 0), 0);
            const totalFat = todayEntries.reduce((s, e) => s + (e.fat || 0), 0);

            document.getElementById('total-calories').innerText = totalCal.toLocaleString();
            document.getElementById('total-protein').innerText = Math.round(totalProtein);
            document.getElementById('total-carbs').innerText = Math.round(totalCarbs);
            document.getElementById('total-fat').innerText = Math.round(totalFat);
            
            document.getElementById('goal-protein-display').innerText = goals.protein || 0;

            const percent = Math.min((totalCal / goals.energy) * 100, 100);
            const circle = document.getElementById('progress-circle');
            if (circle) circle.style.strokeDashoffset = 263.89 - (percent / 100 * 263.89);
            document.getElementById('percent-display').innerText = Math.round(percent) + '%';

            // Update weight display
            const avg = getDailyAvg(today);
            const weightDisplay = document.getElementById('current-weight-display');
            if (weightDisplay) weightDisplay.innerText = avg ? avg.toFixed(1) : "--";

            // Weight Icons Status
            const morningVal = weightData[today] ? weightData[today].morning : null;
            const eveningVal = weightData[today] ? weightData[today].evening : null;
            const iconMorning = document.getElementById('icon-morning');
            const iconEvening = document.getElementById('icon-evening');
            if (iconMorning) iconMorning.className = `fas fa-sun ${morningVal ? 'text-orange-400' : 'text-slate-100'}`;
            if (iconEvening) iconEvening.className = `fas fa-moon ${eveningVal ? 'text-blue-400' : 'text-slate-100'}`;

            // Render Meal List
            const container = document.getElementById('meal-sections-container');
            if (!container) return;
            container.innerHTML = '';
            ["เช้า", "กลางวัน", "เย็น", "ว่าง"].forEach(meal => {
                const mEntries = todayEntries.filter(e => e.meal === meal);
                const mCal = mEntries.reduce((s, e) => s + e.calories, 0);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between px-2 mb-2"><span class="text-[9px] font-black text-slate-300 uppercase">${meal}</span><span class="text-[9px] font-bold text-slate-400">${mCal} kcal</span></div>
                    <div class="space-y-2">${mEntries.map(e => `
                        <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-slate-700">${e.name}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-400">${e.calories} kcal</span>
                                    <button onclick="removeEntry(${e.id})" class="text-slate-200"><i class="fas fa-times-circle"></i></button>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <div class="text-[9px] font-bold text-slate-400">P: <span class="text-rose-500">${e.protein || 0}g</span></div>
                                <div class="text-[9px] font-bold text-slate-400">C: <span class="text-blue-500">${e.carbs || 0}g</span></div>
                                <div class="text-[9px] font-bold text-slate-400">F: <span class="text-amber-500">${e.fat || 0}g</span></div>
                            </div>
                        </div>
                    `).join('')}</div>
                `;
                container.appendChild(div);
            });
        }

        function showMessage(t, type = "error") {
            const m = document.createElement('div');
            m.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full text-white text-[10px] font-bold z-[200] ${type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`;
            m.innerText = t;
            document.body.appendChild(m);
            setTimeout(() => { if (m.parentNode) m.parentNode.removeChild(m); }, 2000);
        }

        function resetData() { if (confirm("ล้างข้อมูล?")) { localStorage.clear(); location.reload(); } }
        function updateGoal() { 
            goals.energy = parseInt(document.getElementById('set-goal').value) || 0; 
            goals.protein = parseInt(document.getElementById('set-goal-protein').value) || 0; 
            localStorage.setItem('gas_goals', JSON.stringify(goals)); 
            render(); 
            syncToSheet(); 
        }
        function changeMonth(o) { calendarDate.setMonth(calendarDate.getMonth() + o); renderCalendar(); }

        // Image Scan Logic (Placeholder)
        function handleImageScan(input) {
            if (input.files && input.files[0]) {
                showMessage("กำลังเตรียมวิเคราะห์รูปภาพ...", "success");
                setTimeout(() => { showMessage("ฟีเจอร์วิเคราะห์รูปภาพกำลังจะมาเร็วๆ นี้!", "success"); }, 1500);
            }
        }

        // Global Error Handler
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            showMessage("JS Error: " + msg + " at " + lineNo);
            return false;
        };

        window.onload = () => {
            try {
                // Render local data immediately first
                render();
                
                const goalInput = document.getElementById('set-goal');
                const proteinGoalInput = document.getElementById('set-goal-protein');
                if (goalInput) goalInput.value = goals.energy;
                if (proteinGoalInput) proteinGoalInput.value = goals.protein || 100;
                
                setWeightTime('morning');
                
                // Then fetch from cloud
                initGAS();
            } catch (e) { console.error("OnLoad Error:", e); }
        };
    </script>
</body>
