<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calorie & Weight Avg Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .tab-active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            padding-top: 4px;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-cell:hover {
            background-color: #f1f5f9;
        }

        .day-cell.today {
            border: 1px solid #f97316;
            font-weight: bold;
        }

        .weight-btn-active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>

<body class="pb-32 pt-2">
    <!-- Top Navigation Tabs -->
    <nav
        class="max-w-md mx-auto px-4 flex justify-between items-center border-b border-slate-100 bg-white sticky top-0 z-[100] shadow-sm">
        <div class="flex gap-1">
            <button onclick="switchTab('today')" id="tab-today"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 tab-active transition-all">Today</button>
            <button onclick="switchTab('history')" id="tab-history"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Calendar</button>
            <button onclick="switchTab('trends')" id="tab-trends"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Trends</button>
            <button onclick="switchTab('settings')" id="tab-settings"
                class="py-3 px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 transition-all">Settings</button>
        </div>
        <button onclick="initGAS()" class="text-slate-300 hover:text-green-500 transition"><i
                class="fas fa-sync-alt text-sm"></i></button>
    </nav>

    <!-- TODAY TAB -->
    <main id="content-today" class="max-w-md mx-auto p-4 space-y-6 relative z-10">

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Calories Today</h2>
                    <div class="flex items-baseline gap-2">

                        <span class="text-slate-400 font-bold text-sm uppercase">kcal</span>
                    </div>
                </div>
                <div class="relative flex items-center justify-center">
                    <svg class="w-24 h-24">
                        <circle class="text-slate-800" stroke-width="8" stroke="currentColor" fill="transparent"
                            r="42" cx="48" cy="48" />
                        <circle id="progress-circle" class="text-orange-500 progress-ring__circle" stroke-width="8"
                            stroke-dasharray="263.89" stroke-dashoffset="263.89" stroke-linecap="round"
                            stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" />
                    </svg>
                    <span id="percent-display" class="absolute text-xs font-bold">0%</span>

            </div>

            <!-- Nutrient Summary -->

                <div class="text-center">

                </div>
                <div class="text-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block mb-1">Fat</span>
                    <div class="text-sm font-bold text-amber-400"><span id="total-fat">0</span><span class="text-[9px] text-slate-500 ml-0.5">g</span></div>
                </div>
            </div>

            <!-- Weight Display in Card -->

                <div class="flex items-center gap-4">
                    <div class="p-3 bg-slate-800 rounded-2xl">
                        <i class="fas fa-weight text-blue-400"></i>
                    </div>
                    <div>

                        <span id="current-weight-display" class="text-lg font-bold">--</span>

        <!-- Weight Entry Form -->

                <button onclick="saveWeight()"

                    <div class="border-b border-slate-100">

                        <select id="meal-type"

                <div class="text-center text-[9px] font-black text-slate-300 uppercase">S</div>

    <!-- SETTINGS TAB -->

    <!-- Global Sync Loader Overlay -->
    <div id="sync-loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-[9999] flex flex-col items-center justify-center transition-all opacity-0 pointer-events-none">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl flex flex-col items-center gap-4 scale-90 transition-all duration-300" id="sync-loader-card">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-orange-500 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <div class="text-center">
                <p id="sync-text" class="text-slate-800 font-bold text-sm">กำลังเชื่อมต่อ Cloud...</p>
                <p class="text-slate-400 text-[10px] uppercase font-black tracking-widest mt-1">Please Wait</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza3Y1Xzql7VImSvY-_4HXpMoWWTb680tm5Lm-hxqPVy7fir4yDrTLHK1fcjcum_iAWOA/exec"; 

        let entries = [];
        let weightData = {};
        let goals = { energy: 2000, protein: 100 };
        let currentWeightTime = 'morning';
        let calendarDate = new Date();
        let weightChart = null;
        function fetchDataJSONP(action) {
            return new Promise((resolve, reject) => {
                if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) {
                    resolve(null);
                    return;
                }
                const callbackName = 'cb_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                script.onerror = () => {
                    if (script.parentNode) document.body.removeChild(script);
                    reject(new Error('Network connectivity issue'));
                };
                script.src = `${SCRIPT_URL}?action=${action}&callback=${callbackName}`;
                document.body.appendChild(script);
                // 30 seconds timeout for mobile stability
                setTimeout(() => { 
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) document.body.removeChild(script);
                        reject(new Error('Request Timeout'));
                    }
                }, 30000);
            });
        }

        function showSyncLoader(text = "กำลังซิงค์ข้อมูล...") {
            const loader = document.getElementById('sync-loader');
            const card = document.getElementById('sync-loader-card');
            const textEl = document.getElementById('sync-text');
            textEl.innerText = text;
            loader.classList.remove('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-90');
            card.classList.add('scale-100');
        }

        function hideSyncLoader() {
            const loader = document.getElementById('sync-loader');
            const card = document.getElementById('sync-loader-card');
            loader.classList.add('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-100');
            card.classList.add('scale-90');
        }

        /**
         * Initialize data from Google Sheets via JSONP
         */
        async function initGAS() {
            if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) return;
            
            showSyncLoader("กำลังซิงค์ข้อมูล Cloud...");
            try {
                const data = await fetchDataJSONP('read');
                if (data) {
                    if (data.entries) entries = data.entries;
                    
                    // Normalize weightData keys to en-CA format
                    if (data.weightData) {
                        const normalized = {};
                        Object.keys(data.weightData).forEach(k => {
                            try {
                                const d = new Date(k);
                                if (!isNaN(d.getTime())) {
                                    const cleanKey = d.toLocaleDateString('en-CA');
                                    normalized[cleanKey] = data.weightData[k];
                                } else {
                                    normalized[k] = data.weightData[k];
                                }
                            } catch(e) { normalized[k] = data.weightData[k]; }
                        });
                        weightData = normalized;
                    }
                    
                    if (data.goals) goals = data.goals;
                    
                    const goalInput = document.getElementById('set-goal');
                    const proteinGoalInput = document.getElementById('set-goal-protein');
                    if (goalInput) goalInput.value = goals.energy;
                    if (proteinGoalInput) proteinGoalInput.value = goals.protein || 100;
                    
                    render();
                    console.log("Cloud data loaded and normalized");
                }
            } catch (e) {
                console.error("Initialization Failed:", e);
                // Try to recover from local storage if cloud fails
                const localEntries = localStorage.getItem('gas_entries_v3');
                if (localEntries) {
                    entries = JSON.parse(localEntries);
                    weightData = JSON.parse(localStorage.getItem('gas_weight_data') || '{}');
                    goals = JSON.parse(localStorage.getItem('gas_goals') || '{"energy":2000,"protein":100}');
                    render();
                }
            } finally {
                hideSyncLoader();
            }
        }

        /**
         * Sync all data to Google Sheets via POST
         */
        async function syncToSheet() {
            if (SCRIPT_URL.includes("YOUR_SCRIPT_URL")) return;

            const payload = {
                action: 'sync',
                payload: {
                    entries: entries,
                    weightData: weightData,
                    goals: goals
                }
            };

            showSyncLoader("กำลังบันทึกลง Cloud...");
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                
                // Success feedback after short delay to ensure GAS processing
                setTimeout(() => {
                    hideSyncLoader();
                    showMessage("บันทึกสำเร็จ", "success");
                }, 1500);
                
            } catch (err) {
                console.error("Sync Error:", err);
                hideSyncLoader();
                showMessage("Sync Error: " + err.message);
            }
        }

        // Weight Logic
        function setWeightTime(time) {
            currentWeightTime = time;
            document.getElementById('btn-morning').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'morning' ? 'weight-btn-active' : 'text-slate-400'}`;
            document.getElementById('btn-evening').className = `flex-1 py-2 text-[10px] font-bold rounded-lg transition-all ${time === 'evening' ? 'weight-btn-active' : 'text-slate-400'}`;

            const today = new Date().toISOString().split('T')[0];
            const currentVal = (weightData[today] && weightData[today][time]) ? weightData[today][time] : "";
            const weightInput = document.getElementById('daily-weight');
            if (weightInput) weightInput.value = currentVal;
        }

        function saveWeight() {
            const val = parseFloat(document.getElementById('daily-weight').value);
            if (!val) return;
            const today = new Date().toISOString().split('T')[0];
            if (!weightData[today]) weightData[today] = {};
            weightData[today][currentWeightTime] = val;
            localStorage.setItem('gas_weight_data', JSON.stringify(weightData));
            render();
            showMessage(`บันทึกน้ำหนัก${currentWeightTime === 'morning' ? 'เช้า' : 'เย็น'}แล้ว`, "success");
            syncToSheet(); 
        }

        function getDailyAvg(dateStr) {
            const data = weightData[dateStr];
            if (!data) return null;
            const vals = [];
            if (data.morning) vals.push(data.morning);
            if (data.evening) vals.push(data.evening);
            if (vals.length === 0) return null;
            return vals.reduce((a, b) => a + b, 0) / vals.length;
        }

        // Navigation
        function switchTab(tab) {
            console.log("Switching to tab: " + tab);
            ['today', 'history', 'trends', 'settings'].forEach(t => {
                const content = document.getElementById(`content-${t}`);
                const tabBtn = document.getElementById(`tab-${t}`);
                if (content) content.classList.toggle('hidden', t !== tab);
                if (tabBtn) tabBtn.classList.toggle('tab-active', t === tab);
            });
            if (tab === 'history') renderCalendar();
            if (tab === 'trends') renderWeightChart();
        }

        // Trends View
        function renderWeightChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            const dates = Object.keys(weightData).sort();
            const avgWeights = dates.map(d => getDailyAvg(d)).filter(v => v !== null);
            const validDates = dates.filter(d => getDailyAvg(d) !== null);

            if (weightChart) weightChart.destroy();
            if (avgWeights.length > 0) {
                document.getElementById('stat-max-w').innerText = Math.max(...avgWeights).toFixed(1);
                document.getElementById('stat-min-w').innerText = Math.min(...avgWeights).toFixed(1);
            }

            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: validDates.map(d => new Date(d).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })),
                    datasets: [{
                        data: avgWeights,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#f8fafc' } }, x: { grid: { display: false } } }
                }
            });
        }

        function setWeightTime(t) {
            currentWeightTime = t;
            document.getElementById('btn-morning').className = `flex-1 py-3 text-xs font-bold rounded-xl transition-all ${t === 'morning' ? 'weight-btn-active' : 'text-slate-400'}`;
            document.getElementById('btn-evening').className = `flex-1 py-3 text-xs font-bold rounded-xl transition-all ${t === 'evening' ? 'weight-btn-active' : 'text-slate-400'}`;
        }

        let isSyncing = false;
        function saveWeight() {
            if (isSyncing) return;
            const val = parseFloat(document.getElementById('daily-weight').value);
            if (isNaN(val)) return;
            
            const today = new Date().toLocaleDateString('en-CA');
            if (!weightData[today]) weightData[today] = {};
            weightData[today][currentWeightTime] = val;
            
            localStorage.setItem('gas_weight_data', JSON.stringify(weightData));
            document.getElementById('daily-weight').value = '';
            render();
            
            isSyncing = true;
            syncToSheet().finally(() => { isSyncing = false; });
            showMessage("บันทึกน้ำหนักแล้ว", "success");
        }

        function getDailyAvg(date) {
            if (!weightData[date]) return null;
            const m = weightData[date].morning;
            const e = weightData[date].evening;
            if (m && e) return (m + e) / 2;
            return m || e || null;
        }

        function addEntry() {
            if (isSyncing) return;
            const name = document.getElementById('food-name').value;
            const cal = parseInt(document.getElementById('food-cal').value);
            if (!name || isNaN(cal)) {
                showMessage("กรุณากรอกชื่ออาหารและแคลอรี่", "error");
                return;
            }

            const newEntry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('en-CA'), 
                meal: document.getElementById('meal-type').value,
                name: name,
                calories: cal,
                protein: parseFloat(document.getElementById('food-protein').value) || 0,
                carbs: parseFloat(document.getElementById('food-carbs').value) || 0,
                fat: parseFloat(document.getElementById('food-fat').value) || 0
            };

            entries.unshift(newEntry);
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            
            document.getElementById('food-name').value = '';
            document.getElementById('food-cal').value = '';
            document.getElementById('food-protein').value = '';
            document.getElementById('food-carbs').value = '';
            document.getElementById('food-fat').value = '';

            render();
            isSyncing = true;
            syncToSheet().finally(() => { isSyncing = false; });
            showMessage("บันทึกอาหารแล้ว", "success");
        }

        function updateCalculatedCalories() {
            const p = parseFloat(document.getElementById('food-protein').value) || 0;
            const c = parseFloat(document.getElementById('food-carbs').value) || 0;
            const f = parseFloat(document.getElementById('food-fat').value) || 0;
            const calc = (p * 4) + (c * 4) + (f * 9);
            
            const hint = document.getElementById('calculated-hint');
            const display = document.getElementById('calc-val');
            
            if (calc > 0) {
                hint.classList.remove('hidden');
                display.innerText = Math.round(calc);
            } else {
                hint.classList.add('hidden');
            }
        }

        function removeEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('gas_entries_v3', JSON.stringify(entries));
            render();
            syncToSheet(); 
        }

        // Calendar Helper
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if (!grid) return;
            grid.innerHTML = '';
            const firstDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();
            document.getElementById('calendar-month-year').innerText = calendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

            const grouped = entries.reduce((acc, curr) => {
                if (!acc[curr.date]) acc[curr.date] = 0;
                acc[curr.date] += (curr.calories || 0);
                return acc;
            }, {});

            const todayStr = new Date().toLocaleDateString('en-CA');

            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day);
                const dateStr = d.toLocaleDateString('en-CA');
                const cal = grouped[dateStr] || 0;
                
                const div = document.createElement('div');
                const isToday = todayStr === dateStr;
                div.className = `h-10 flex flex-col items-center justify-center rounded-xl text-[10px] font-bold cursor-pointer transition ${isToday ? 'bg-orange-500 text-white' : 'hover:bg-slate-50 text-slate-600'}`;
                
                div.innerHTML = `<span>${day}</span>`;
                if (cal > 0) {
                    div.innerHTML += `<div class="w-1 h-1 rounded-full ${isToday ? 'bg-white' : 'bg-orange-400'} mt-0.5"></div>`;
                }
                
                div.onclick = () => showDayDetail(dateStr);
                grid.appendChild(div);
            }
        }

        function showDayDetail(dateStr) {
            const dayEntries = entries.filter(e => e.date === dateStr);
            const detail = document.getElementById('history-detail');
            if (dayEntries.length === 0) { detail.classList.add('hidden'); return; }
            
            detail.classList.remove('hidden');
            document.getElementById('selected-date-label').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
            
            const total = dayEntries.reduce((s, e) => s + (e.calories || 0), 0);
            const p = dayEntries.reduce((s, e) => s + (e.protein || 0), 0);
            const c = dayEntries.reduce((s, e) => s + (e.carbs || 0), 0);
            const f = dayEntries.reduce((s, e) => s + (e.fat || 0), 0);
            
            document.getElementById('selected-total-cal').innerText = `${Math.round(total)} kcal`;
            document.getElementById('selected-p').innerText = Math.round(p);
            document.getElementById('selected-c').innerText = Math.round(c);
            document.getElementById('selected-f').innerText = Math.round(f);
            
            document.getElementById('selected-day-entries').innerHTML = dayEntries.map(e => `
                <div class="flex justify-between items-center py-2 border-b border-slate-50">
                    <div>
                        <div class="text-xs font-bold text-slate-700">${e.name}</div>
                        <div class="text-[8px] text-slate-400">P:${e.protein||0} C:${e.carbs||0} F:${e.fat||0}</div>
                    </div>
                    <span class="text-xs font-bold text-orange-400">${e.calories} kcal</span>
                </div>
            `).join('');
            
            // Scroll to detail smoothly
            detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function render() {
            const today = new Date().toLocaleDateString('en-CA'); // Reliable YYYY-MM-DD
            
            // Robust date filtering
            const todayEntries = entries.filter(e => {
                if (!e.date) return false;
                return String(e.date).includes(today);
            });
            
            const totalCal = todayEntries.reduce((s, e) => s + (e.calories || 0), 0);
            const totalProtein = todayEntries.reduce((s, e) => s + (e.protein || 0), 0);
            const totalCarbs = todayEntries.reduce((s, e) => s + (e.carbs || 0), 0);
            const totalFat = todayEntries.reduce((s, e) => s + (e.fat || 0), 0);

            document.getElementById('total-calories').innerText = totalCal.toLocaleString();
            document.getElementById('total-protein').innerText = Math.round(totalProtein);
            document.getElementById('total-carbs').innerText = Math.round(totalCarbs);
            document.getElementById('total-fat').innerText = Math.round(totalFat);
            
            document.getElementById('goal-protein-display').innerText = goals.protein || 0;

            const percent = Math.min((totalCal / goals.energy) * 100, 100);
            const circle = document.getElementById('progress-circle');
            if (circle) circle.style.strokeDashoffset = 263.89 - (percent / 100 * 263.89);
            document.getElementById('percent-display').innerText = Math.round(percent) + '%';

            // Update weight display
            const avg = getDailyAvg(today);
            const weightDisplay = document.getElementById('current-weight-display');
            if (weightDisplay) weightDisplay.innerText = avg ? avg.toFixed(1) : "--";

            // Weight Icons Status
            const morningVal = weightData[today] ? weightData[today].morning : null;
            const eveningVal = weightData[today] ? weightData[today].evening : null;
            const iconMorning = document.getElementById('icon-morning');
            const iconEvening = document.getElementById('icon-evening');
            if (iconMorning) iconMorning.className = `fas fa-sun ${morningVal ? 'text-orange-400' : 'text-slate-100'}`;
            if (iconEvening) iconEvening.className = `fas fa-moon ${eveningVal ? 'text-blue-400' : 'text-slate-100'}`;

            // Render Meal List
            const container = document.getElementById('meal-sections-container');
            if (!container) return;
            container.innerHTML = '';
            ["เช้า", "กลางวัน", "เย็น", "ว่าง"].forEach(meal => {
                const mEntries = todayEntries.filter(e => e.meal === meal);
                const mCal = mEntries.reduce((s, e) => s + e.calories, 0);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between px-2 mb-2"><span class="text-[9px] font-black text-slate-300 uppercase">${meal}</span><span class="text-[9px] font-bold text-slate-400">${mCal} kcal</span></div>
                    <div class="space-y-2">${mEntries.map(e => `
                        <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-slate-700">${e.name}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-400">${e.calories} kcal</span>
                                    <button onclick="removeEntry(${e.id})" class="text-slate-200"><i class="fas fa-times-circle"></i></button>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <div class="text-[9px] font-bold text-slate-400">P: <span class="text-rose-500">${e.protein || 0}g</span></div>
                                <div class="text-[9px] font-bold text-slate-400">C: <span class="text-blue-500">${e.carbs || 0}g</span></div>
                                <div class="text-[9px] font-bold text-slate-400">F: <span class="text-amber-500">${e.fat || 0}g</span></div>
                            </div>
                        </div>
                    `).join('')}</div>
                `;
                container.appendChild(div);
            });
        }

        function showMessage(t, type = "error") {
            const m = document.createElement('div');
            m.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full text-white text-[10px] font-bold z-[200] ${type === 'success' ? 'bg-green-500' : 'bg-slate-800'}`;
            m.innerText = t;
            document.body.appendChild(m);
            setTimeout(() => { if (m.parentNode) m.parentNode.removeChild(m); }, 2000);
        }

        function resetData() { if (confirm("ล้างข้อมูล?")) { localStorage.clear(); location.reload(); } }
        
        function updateGoal() { 
            goals.energy = parseInt(document.getElementById('set-goal').value) || 0; 
            goals.protein = parseInt(document.getElementById('set-goal-protein').value) || 0; 
            localStorage.setItem('gas_goals', JSON.stringify(goals)); 
            render(); 
            syncToSheet(); 
        }
        function changeMonth(o) { calendarDate.setMonth(calendarDate.getMonth() + o); renderCalendar(); }

        // Image Scan Logic (Placeholder)
        function handleImageScan(input) {
            if (input.files && input.files[0]) {
                showMessage("กำลังเตรียมวิเคราะห์รูปภาพ...", "success");
                setTimeout(() => { showMessage("ฟีเจอร์วิเคราะห์รูปภาพกำลังจะมาเร็วๆ นี้!", "success"); }, 1500);
            }
        }

        // Global Error Handler
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            showMessage("JS Error: " + msg + " at " + lineNo);
            return false;
        };

        window.onload = () => {
            initGAS();
        };
    </script>
</body>

</html>
